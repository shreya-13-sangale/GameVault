services:
  mysql:
    image: mysql:8.0
    container_name: gamevault-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gamevault_db
    ports:
      - "3307:3306"
    volumes:
      - gamevault_mysql_data:/var/lib/mysql

  app:
    build: .
    container_name: gamevault-app
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gamevault_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8086:8086"

volumes:
  gamevault_mysql_data: